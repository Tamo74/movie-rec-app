<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MovieRecApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/main.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    
    <!-- Header injected by JS -->

    <!-- Discover Genres -->
    <div class="genres-section">
        <h2 class="section-title">Discover Genres</h2>
        <div class="genre-buttons">
            <button class="genre-btn" data-id="28">Action</button>
            <button class="genre-btn" data-id="12">Adventure</button>
            <button class="genre-btn" data-id="16">Animation</button>
            <button class="genre-btn" data-id="35">Comedy</button>
            <button class="genre-btn" data-id="80">Crime</button>
            <button class="genre-btn" data-id="99">Documentary</button>
            <button class="genre-btn" data-id="18">Drama</button>
            <button class="genre-btn" data-id="10751">Family</button>
            <button class="genre-btn" data-id="14">Fantasy</button>
            <button class="genre-btn" data-id="27">Horror</button>
            <button class="genre-btn" data-id="9648">Mystery</button>
            <button class="genre-btn" data-id="10749">Romance</button>
            <button class="genre-btn" data-id="878">Sci-Fi</button>
            <button class="genre-btn" data-id="53">Thriller</button>
            <button class="genre-btn" data-id="37">Western</button>
        </div>
        <div id="genreResults" class="genre-results"></div>
    </div>

    <!-- Upcoming Movies -->
    <div class="carousel-section">
    <h2 class="section-title">Upcoming Releases</h2>

    <div id="movieCarousel" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-indicators">
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="2"></button>
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="3"></button>
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="4"></button>
        </div>

        <div class="carousel-inner"></div>

        <button class="carousel-control-prev" type="button" data-bs-target="#movieCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#movieCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>
    </div>

    <!-- Search results -->
    <div id="moviesContainer"></div>

    <script src="/home.js" type="module"></script>
</body>
</html>
