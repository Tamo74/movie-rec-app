{% extends "base.html" %}
{% block content %}
<div class="card-wrapper">

  <div class="card">
    <h1 class="center">Create an account</h1>
    <form name="signup_form" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input type="text" name="name" class="field" placeholder="Jane Doe">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" class="field" placeholder="jane@example.com">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="field" placeholder="Min 8 chars, 1 number, 1 symbol">
      </div>
      <p class="error error--hidden"></p>
      <input type="submit" value="Sign up" class="btn">
    </form>
  </div>

  <div class="card">
    <h1 class="center">Log in</h1>
    <form name="login_form" novalidate>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="field" placeholder="jane@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="field" placeholder="Your password">
      </div>
      <p class="error error--hidden"></p>
      <input type="submit" value="Log in" class="btn">
    </form>
  </div>

</div>
{% endblock %}
