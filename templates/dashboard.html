{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="card">
        <h1>Dashboard</h1>
        <nav>
            <a href="/dashboard/">Dashboard</a>
            <a href="/user/signout">Logout</a>
        </nav>

        <h2>Client Dashboard</h2>

        <div class="user-info">
            <p><strong>Logged in:</strong> {{ session['logged_in'] }}</p>
            <p><strong>User:</strong></p>
            <pre>{{ session['user'] | tojson }}</pre>
        </div>

        <a href="/user/signout" class="logout">Logout</a>
    </div>
</div>
{% endblock %}
