<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Detail - MovieRecommender</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/main.css">
  <style>
    body { background: #f8f9fa; }
    .detail-page { max-width: 960px; margin: 32px auto; padding: 0 20px; }
    .detail-card {
      display: flex;
      gap: 32px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      padding: 32px;
      margin-bottom: 32px;
    }
    .detail-poster img {
      width: 220px;
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }
    .detail-info { flex: 1; }
    .detail-title { font-size: 2rem; font-weight: 800; color: #1a1a2e; margin-bottom: 8px; }
    .detail-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .detail-tag {
      background: #f1f3f5;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.88rem;
      color: #495057;
      font-weight: 500;
    }
    .detail-description { color: #444; line-height: 1.7; margin-bottom: 20px; }
    .detail-cast { font-size: 0.9rem; color: #6c757d; margin-bottom: 20px; }
    .detail-cast span { font-weight: 600; color: #1a1a2e; }
    .reviews-section { background: #fff; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 28px 32px; }
    .reviews-section h2 { font-size: 1.3rem; font-weight: 700; color: #1a1a2e; margin-bottom: 20px; }
    .review-card {
      border: 1px solid #e9ecef;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 14px;
      background: #fafafa;
    }
    .review-title { font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .review-stars { color: #f5a623; font-size: 1.1rem; margin-bottom: 6px; }
    .review-text { color: #555; font-size: 0.92rem; margin: 0; }
    .star-row { display: flex; gap: 8px; font-size: 1.8rem; cursor: pointer; margin-bottom: 12px; }
    .star { color: #ccc; transition: color 0.15s; user-select: none; }
    .star.hovered, .star.selected { color: #f5a623; }
    .review-form textarea {
      width: 100%;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 80px;
      margin-bottom: 10px;
    }
    .review-submit-btn {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .review-submit-btn:hover { background: #c73652; }
    @media (max-width: 640px) {
      .detail-card { flex-direction: column; }
      .detail-poster img { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Header injected by JS -->

  <div class="detail-page">
    <div class="detail-card">
      <div class="detail-poster">
        <img id="moviePoster" src="" alt="Movie Poster">
      </div>
      <div class="detail-info">
        <div class="detail-title" id="movieTitle">Loading...</div>
        <div class="detail-meta">
          <span class="detail-tag" id="movieGenre"></span>
          <span class="detail-tag" id="movieRelease"></span>
        </div>
        <p class="detail-description" id="movieDescription"></p>
        <p class="detail-cast"><span>Cast:</span> <span id="movieCast"></span></p>
        <button class="save-movie-btn" id="saveBtn" style="max-width:200px;">♡ Save Movie</button>
      </div>
    </div>

    <div class="reviews-section">
      <h2>Reviews</h2>
      <div id="reviewsContainer"><p class="text-muted">Loading reviews...</p></div>

      <hr>
      <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:12px;">Leave a Review</h3>
      <div class="review-form">
        <div id="starRating" class="star-row">
          <span class="star" data-value="1">★</span>
          <span class="star" data-value="2">★</span>
          <span class="star" data-value="3">★</span>
          <span class="star" data-value="4">★</span>
          <span class="star" data-value="5">★</span>
        </div>
        <textarea id="reviewInput" placeholder="Share your thoughts on this movie..."></textarea>
        <button class="review-submit-btn" onclick="submitReview()">Post Review</button>
      </div>
    </div>
  </div>

  <script src="/movieDetails.js" type="module"></script>
</body>
</html>
