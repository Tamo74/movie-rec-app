<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin — MovieRec</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/admin.css">
</head>
<body>

  <header class="topbar">
    <div class="brand">MovieRec <span>Admin</span></div>
    <div class="topbar-actions">
      <a href="/dashboard/"><i class="bi bi-house"></i> Home</a>
      <a href="/user/signout" class="logout-btn"><i class="bi bi-box-arrow-right"></i> Sign out</a>
    </div>
  </header>

  <div class="layout">

    <nav class="sidebar">
      <div class="sidebar-label">Management</div>
      <a href="/admin/dashboard" class="active"><i class="bi bi-film"></i> Movies</a>
      <a href="/dashboard/"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <div class="sidebar-label">Account</div>
      <a href="/settings"><i class="bi bi-gear"></i> Settings</a>
      <a href="/user/signout"><i class="bi bi-box-arrow-right"></i> Sign out</a>
    </nav>

    <main class="main">

      <div class="page-header">
        <div>
          <h1>Movie Manager</h1>
          <p>Add, edit and remove movies from the catalogue</p>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="icon"><i class="bi bi-film"></i></div>
          <div class="label">Total Movies</div>
          <div class="value" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="icon"><i class="bi bi-tags"></i></div>
          <div class="label">Genres</div>
          <div class="value" id="statGenres">—</div>
        </div>
        <div class="stat-card">
          <div class="icon"><i class="bi bi-calendar3"></i></div>
          <div class="label">Latest Year</div>
          <div class="value" id="statYear">—</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title"><i class="bi bi-plus-circle"></i> Add New Movie</div>
        <div class="form-row">
          <div class="form-group">
            <label>Title *</label>
            <input id="addTitle" placeholder="e.g. Interstellar">
          </div>
          <div class="form-group">
            <label>Genre</label>
            <input id="addGenre" placeholder="e.g. Sci-Fi">
          </div>
          <div class="form-group form-group--narrow">
            <label>Year</label>
            <input id="addYear" placeholder="2024" type="number">
          </div>
          <div class="form-group form-group--auto">
            <label class="label-hidden">Add</label>
            <button class="btn-primary-red" onclick="addMovie()"><i class="bi bi-plus-lg"></i> Add Movie</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title"><i class="bi bi-collection"></i> Movie Catalogue</div>

        <div class="search-row">
          <div class="search-wrap">
            <i class="bi bi-search"></i>
            <input id="searchInput" placeholder="Filter by title or genre…" oninput="filterMovies()">
          </div>
          <button class="btn-secondary" onclick="loadMovies()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
        </div>

        <div class="table-scroll">
          <table class="movie-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Title</th>
                <th>Genre</th>
                <th>Year</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="movieTableBody">
              <tr><td colspan="5"><div class="empty-state"><i class="bi bi-hourglass-split"></i>Loading…</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal-box">
      <h3><i class="bi bi-pencil"></i>Edit Movie</h3>
      <input type="hidden" id="editId">
      <div class="modal-form">
        <div class="form-group">
          <label>Title</label>
          <input id="editTitle" placeholder="Movie title">
        </div>
        <div class="form-group">
          <label>Genre</label>
          <input id="editGenre" placeholder="Genre">
        </div>
        <div class="form-group">
          <label>Year</label>
          <input id="editYear" type="number" placeholder="Year">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()"><i class="bi bi-x"></i> Cancel</button>
        <button class="btn-primary-red" onclick="saveEdit()"><i class="bi bi-check-lg"></i> Save Changes</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    let allMovies = [];

    window.onload = () => loadMovies();

    async function loadMovies() {
      try {
        const res = await fetch('/api/admin/movies');
        if (!res.ok) throw new Error('Server returned ' + res.status);
        allMovies = await res.json();
        renderTable(allMovies);
        updateStats(allMovies);
      } catch (e) {
        document.getElementById('movieTableBody').innerHTML =
          `<tr><td colspan="5"><div class="empty-state"><i class="bi bi-exclamation-triangle"></i>${e.message}</div></td></tr>`;
      }
    }

    function renderTable(movies) {
      const tbody = document.getElementById('movieTableBody');
      if (!movies.length) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><i class="bi bi-film"></i>No movies yet. Add one above!</div></td></tr>`;
        return;
      }
      tbody.innerHTML = movies.map((m, i) => `
        <tr>
          <td class="row-num">${i + 1}</td>
          <td class="title-cell">${escHtml(m.title)}</td>
          <td>${m.genre ? `<span class="badge-genre">${escHtml(m.genre)}</span>` : '<span class="no-value">—</span>'}</td>
          <td>${m.year || '<span class="no-value">—</span>'}</td>
          <td>
            <div class="action-btns">
              <button class="btn-edit" onclick="openEdit('${m._id}','${escAttr(m.title)}','${escAttr(m.genre||'')}','${escAttr(String(m.year||''))}')">
                <i class="bi bi-pencil"></i> Edit
              </button>
              <button class="btn-del" onclick="deleteMovie('${m._id}', this)">
                <i class="bi bi-trash3"></i> Delete
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function filterMovies() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      renderTable(allMovies.filter(m =>
        (m.title || '').toLowerCase().includes(q) ||
        (m.genre || '').toLowerCase().includes(q)
      ));
    }

    function updateStats(movies) {
      document.getElementById('statTotal').textContent = movies.length;
      const genres = new Set(movies.map(m => m.genre).filter(Boolean));
      document.getElementById('statGenres').textContent = genres.size;
      const years = movies.map(m => parseInt(m.year)).filter(Boolean);
      document.getElementById('statYear').textContent = years.length ? Math.max(...years) : '—';
    }

    async function addMovie() {
      const title = document.getElementById('addTitle').value.trim();
      const genre = document.getElementById('addGenre').value.trim();
      const year  = document.getElementById('addYear').value.trim();
      if (!title) { toast('Please enter a movie title', 'error'); return; }
      try {
        const res = await fetch('/api/admin/movies', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ title, genre, year })
        });
        if (!res.ok) throw new Error('Failed to add movie');
        document.getElementById('addTitle').value = '';
        document.getElementById('addGenre').value = '';
        document.getElementById('addYear').value  = '';
        toast(`"${title}" added successfully`, 'success');
        loadMovies();
      } catch (e) { toast(e.message, 'error'); }
    }

    function openEdit(id, title, genre, year) {
      document.getElementById('editId').value    = id;
      document.getElementById('editTitle').value = title;
      document.getElementById('editGenre').value = genre;
      document.getElementById('editYear').value  = year;
      document.getElementById('editModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('open');
    }

    async function saveEdit() {
      const id    = document.getElementById('editId').value;
      const title = document.getElementById('editTitle').value.trim();
      const genre = document.getElementById('editGenre').value.trim();
      const year  = document.getElementById('editYear').value.trim();
      if (!title) { toast('Title cannot be empty', 'error'); return; }
      try {
        const res = await fetch('/api/admin/movies/' + id, {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ title, genre, year })
        });
        if (!res.ok) throw new Error('Failed to save changes');
        closeModal();
        toast(`"${title}" updated`, 'success');
        loadMovies();
      } catch (e) { toast(e.message, 'error'); }
    }

    async function deleteMovie(id, btn) {
      if (!confirm('Delete this movie? This cannot be undone.')) return;
      btn.disabled = true;
      try {
        const res = await fetch('/api/admin/movies/' + id, { method: 'DELETE' });
        if (!res.ok) throw new Error('Failed to delete');
        toast('Movie deleted', 'success');
        loadMovies();
      } catch (e) { toast(e.message, 'error'); btn.disabled = false; }
    }

    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escAttr(s) { return String(s).replace(/'/g,"\\'"); }

    document.getElementById('editModal').addEventListener('click', e => {
      if (e.target === document.getElementById('editModal')) closeModal();
    });
  </script>
</body>
</html>
