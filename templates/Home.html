<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>MovieRecApp</title>
  
  <!-- Bootstrap CSS -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Bootstrap JS --> 
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
  
  
<body>
    <h1 style="text-align: center;">Movie Recommendation Platform</h1>
    
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Left side -->
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Recommendations</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Reviews</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Saved Movies</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Settings</a>
                </li>
            </ul>

            <!-- Right side -->
            <form class="d-flex ms-auto" role="search">
                <input id="searchInput" class="form-control me-2" type="search" placeholder="Search">
                <button onclick="searchMovies()" class="btn btn-outline-success" type="button">Search</button>
            </form>

            </div>
        </div>
    </nav>

    <h2>Upcoming Releases</h2>

    <div id="movieCarousel" class="carousel slide" data-bs-ride="carousel">
        
        <!-- Indicators -->
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="2"></button>
        </div>

        <!-- Slides -->
        <div class="carousel-inner"></div>
            <div class="carousel-item active">
                <img src="img1.jpg" class="d-block w-100" alt="Movie 1">
            
                <div class="carousel-caption d-none d-md-block">
                    <h5>Upcoming Movie #1</h5>
                    <p>put release date here if not too hard</p>
                </div>
            </div>

            <div class="carousel-item">
                <img src="img2.jpg" class="d-block w-100" alt="Movie 2">
                    
                <div class="carousel-caption d-none d-md-block">
                    <h5>Upcoming Movie #2</h5>
                    <p>put release date here if not too hard</p>
                </div>
            </div>

            <div class="carousel-item">
                <img src="img3.jpg" class="d-block w-100" alt="Movie 3">
                
                <div class="carousel-caption d-none d-md-block">
                    <h5>Upcoming Movie #3</h5>
                    <p>put release date here if not too hard</p>
                </div>
            </div>

        </div>

        <!-- Controls -->
        <button class="carousel-control-prev" type="button" data-bs-target="#movieCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#movieCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>

  <script src="../services/api.js"></script>
  <script src="../scripts/home.js"></script>

</body>
</html>
